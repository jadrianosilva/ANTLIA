<h2>Movimentos Manuais</h2>

<form (ngSubmit)="inserirMovimento()">
  <label>Mês:</label>
  <input type="number" [(ngModel)]="novo.datMes" name="mes" required>

  <label>Ano:</label>
  <input type="number" [(ngModel)]="novo.datAno" name="ano" required>

  <label>Produto:</label>
  <select [(ngModel)]="novo.codProduto" name="produto" (change)="onProdutoChange(novo.codProduto)">
    <option *ngFor="let p of produtos" [value]="p.codProduto">
      {{p.codProduto}} - {{p.desProduto}}
    </option>
  </select>

  <label>COSIF:</label>
  <select [(ngModel)]="novo.codCosif" name="cosif">
    <option *ngFor="let c of cosifs" [value]="c.codCosif">
      {{c.codCosif}} - {{c.codClassificacao}}
    </option>
  </select>

  <label>Valor:</label>
  <input type="number" [(ngModel)]="novo.valValor" name="valor" required>

  <label>Descrição:</label>
  <textarea [(ngModel)]="novo.desDescricao" name="descricao"></textarea>

  <button type="submit">Inserir</button>
  <button type="button" (click)="limpar()">Limpar</button>
</form>

<table>
  <tr>
    <th>Mês</th><th>Ano</th><th>Código Produto</th><th>Descrição Produto</th>
    <th>Nº Lançamento</th><th>Descrição</th><th>Valor</th>
  </tr>
  <tr *ngFor="let m of movimentos">
    <td>{{m.datMes}}</td><td>{{m.datAno}}</td><td>{{m.codProduto}}</td>
    <td>{{m.desProduto}}</td><td>{{m.numLancamento}}</td>
    <td>{{m.desDescricao}}</td><td>{{m.valValor | currency:'BRL'}}</td>
  </tr>
</table>
